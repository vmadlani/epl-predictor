<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixtures — ThirtyEight</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="site-logo" href="index.html"><span class="logo-mark">38</span><span class="logo-word-light">Thirty</span><span class="logo-word-bold">Eight</span></a>
    <nav class="site-nav" id="mainNav">
      <a href="table.html">Table</a>
      <a href="fixtures.html" class="active">Fixtures</a>
      <a href="teams.html">Teams</a>
      <a href="methodology.html">How It Works</a>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">☰</button>
  </div>
</header>

<main class="page-body">
<div class="container">

  <div class="page-header">
    <div class="eyebrow">ThirtyEight · 2025/26 Premier League</div>
    <h1>Remaining Fixtures</h1>
    <p class="deck">Click any fixture to expand the score probability matrix. Probabilities from the Dixon-Coles model.</p>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-team="all">All</button>
  </div>

  <div id="fixturesContainer"></div>

</div>
</main>

<script src="data.js"></script>
<script>
const TEAM_ABBR = {
  'Arsenal':'ARS','Man City':'MCI','Aston Villa':'AVL','Man United':'MUN','Chelsea':'CHE',
  'Liverpool':'LIV','Brentford':'BRE','Everton':'EVE','Newcastle':'NEW','Bournemouth':'BOU',
  'Sunderland':'SUN','Fulham':'FUL','Brighton':'BHA','Crystal Palace':'CRY','Leeds':'LEE',
  'Tottenham':'TOT',"Nott'm Forest":'NFO','West Ham':'WHU','Burnley':'BUR','Wolves':'WOL',
};
const TEAM_COLORS = {
  'Arsenal':'#EF0107','Man City':'#6CABDD','Aston Villa':'#95BFE5','Man United':'#DA291C',
  'Chelsea':'#034694','Liverpool':'#C8102E','Brentford':'#D20000','Everton':'#003399',
  'Newcastle':'#241F20','Bournemouth':'#DA291C','Sunderland':'#EB172B','Fulham':'#888',
  'Brighton':'#0057B8','Crystal Palace':'#1B458F','Leeds':'#c9a800','Tottenham':'#132257',
  "Nott'm Forest":'#DD0000','West Ham':'#7A263A','Burnley':'#6C1D45','Wolves':'#FDB913',
};

function badge(team,size=26) {
  const c=TEAM_COLORS[team]||'#111';
  const a=TEAM_ABBR[team]||team.slice(0,3).toUpperCase();
  return `<div class="team-badge" style="width:${size}px;height:${size}px;background:${c};font-size:${size*.3}px;border-radius:3px">${a}</div>`;
}

function confidenceLevel(maxPct) {
  if (maxPct>=70) return ['STRONG','conf-strong'];
  if (maxPct>=56) return ['MODERATE','conf-moderate'];
  return ['OPEN','conf-open'];
}

function buildScoreMatrix(matrix, home, away) {
  if (!matrix||Object.keys(matrix).length===0) return '<p style="font-size:0.8rem;color:var(--gray4)">No data</p>';
  const maxVal = Math.max(...Object.values(matrix));
  let html=`<table class="score-matrix"><thead><tr><th style="background:transparent;border:none;width:22px"></th>`;
  for (let ag=0;ag<=4;ag++) html+=`<th>${TEAM_ABBR[away]||away} ${ag}</th>`;
  html+=`</tr></thead><tbody>`;
  for (let hg=0;hg<=4;hg++) {
    html+=`<tr><th>${TEAM_ABBR[home]||home} ${hg}</th>`;
    for (let ag=0;ag<=4;ag++) {
      const key=`${hg}-${ag}`, val=matrix[key]||0;
      const intensity=maxVal>0?val/maxVal:0;
      // Gray scale: 0% = white, 100% = near black
      const g=Math.round(245-intensity*230);
      const textColor=intensity>0.55?'#fff':'#111';
      const isBest=val===maxVal;
      html+=`<td style="background:rgb(${g},${g},${g});color:${textColor};${isBest?'font-weight:700':''}" title="${hg}-${ag}: ${val.toFixed(1)}%">${val.toFixed(1)}%</td>`;
    }
    html+=`</tr>`;
  }
  html+=`</tbody></table>`;
  return html;
}

function buildCard(f) {
  const maxP=Math.max(f.homeWin,f.draw,f.awayWin);
  const [confLabel,confClass]=confidenceLevel(maxP);
  const hDom=f.homeWin===maxP,dDom=f.draw===maxP,aDom=f.awayWin===maxP;
  const xgMax=Math.max(f.xgHome,f.xgAway,2.5);
  const cardId=`c-${f.home.replace(/[^a-z]/gi,'')}-${f.away.replace(/[^a-z]/gi,'')}`;

  const card=document.createElement('div');
  card.className=`fixture-card${maxP>=70?' high-conf':''}`;
  card.dataset.home=f.home; card.dataset.away=f.away;

  card.innerHTML=`
    <div class="fixture-main" onclick="toggle('${cardId}')">
      <div class="fixture-team">
        ${badge(f.home,28)}
        <div>
          <div class="fixture-team-name">${f.home}</div>
          <div class="fixture-xg">${f.xgHome} xG</div>
        </div>
      </div>
      <div class="fixture-center">
        <div class="fixture-pred-score">${f.predHome}–${f.predAway}</div>
        <div class="fixture-hda-bar"><div class="hda-h" style="flex:${f.homeWin}"></div><div class="hda-d" style="flex:${f.draw}"></div><div class="hda-a" style="flex:${f.awayWin}"></div></div>
        <div class="fixture-hda-nums">
          <span class="${hDom?'dominant':''}">${f.homeWin}%</span>
          <span class="${dDom?'dominant':''}">${f.draw}%</span>
          <span class="${aDom?'dominant':''}">${f.awayWin}%</span>
        </div>
        <span class="confidence-badge ${confClass}">${confLabel}</span>
      </div>
      <div class="fixture-team away">
        ${badge(f.away,28)}
        <div style="text-align:right">
          <div class="fixture-team-name">${f.away}</div>
          <div class="fixture-xg">${f.xgAway} xG</div>
        </div>
      </div>
    </div>
    <div class="fixture-detail" id="${cardId}">
      <div class="detail-grid">
        <div>
          <div class="score-matrix-title">Probability of every final score</div>
          ${buildScoreMatrix(f.scoreMatrix,f.home,f.away)}
        </div>
        <div>
          <div class="score-matrix-title" style="margin-bottom:0.5rem">Most likely scorelines</div>
          <div class="top-scores">
            ${(f.top5||[]).map((s,i)=>`<div class="top-score-pill${i===0?' best':''}">${s.score} <span style="opacity:0.65">${s.pct}%</span></div>`).join('')}
          </div>
          <div style="margin-top:1rem">
            <div class="score-matrix-title" style="margin-bottom:0.5rem">Expected goals</div>
            <div class="xg-bar-row">
              <span class="xg-num">${f.xgHome}</span>
              <div style="flex:1;height:8px;display:flex;align-items:center">
                <div class="xg-home-bar" style="width:${Math.min(f.xgHome/xgMax*100,100)}%;height:8px"></div>
              </div>
              <span style="font-family:var(--fontMono);font-size:0.65rem;color:var(--gray5);width:30px;text-align:right">${TEAM_ABBR[f.home]||f.home}</span>
            </div>
            <div class="xg-bar-row">
              <span class="xg-num">${f.xgAway}</span>
              <div style="flex:1;height:8px;display:flex;align-items:center">
                <div class="xg-away-bar" style="width:${Math.min(f.xgAway/xgMax*100,100)}%;height:8px"></div>
              </div>
              <span style="font-family:var(--fontMono);font-size:0.65rem;color:var(--gray5);width:30px;text-align:right">${TEAM_ABBR[f.away]||f.away}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  return card;
}

function toggle(id) {
  const el=document.getElementById(id);
  if (el) el.classList.toggle('open');
}
window.toggle=toggle;

// Filter buttons
const GW_KEY=Object.keys(SITE_DATA).find(k=>/^gw\d+$/.test(k));
const GW_NUM=GW_KEY?parseInt(GW_KEY.replace("gw","")):"?";
const teams=Array.from(new Set(SITE_DATA[GW_KEY].flatMap(f=>[f.home,f.away]))).sort();
const filterBar=document.getElementById('filterBar');
teams.forEach(team=>{
  const btn=document.createElement('button');
  btn.className='filter-btn';
  btn.dataset.team=team;
  btn.textContent=TEAM_ABBR[team]||team;
  btn.addEventListener('click',()=>{ setFilter(team); });
  filterBar.appendChild(btn);
});

filterBar.querySelector('[data-team="all"]').addEventListener('click',()=>setFilter('all'));

function setFilter(team) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-team="${team}"]`).classList.add('active');
  render(team);
}

function render(team) {
  const container=document.getElementById('fixturesContainer');
  container.innerHTML='';
  const filtered=team==='all'?SITE_DATA[GW_KEY]:SITE_DATA[GW_KEY].filter(f=>f.home===team||f.away===team);

  const gwLabel=document.createElement('div');
  gwLabel.className='gw-header';
  gwLabel.textContent='Gameweek '+GW_NUM;
  container.appendChild(gwLabel);

  const list=document.createElement('div');
  list.className='fixtures-list animate-in';
  filtered.forEach(f=>list.appendChild(buildCard(f)));
  container.appendChild(list);
}

render('all');

document.getElementById('navToggle').addEventListener('click',()=>{
  document.getElementById('mainNav').classList.toggle('open');
});
</script>
</body>
</html>
